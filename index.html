<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מרכז שליטה ליועץ - Premium UX</title>

<link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
:root {
    --primary: #6c5ce7;
    --primary-light: #a29bfe;
    --secondary: #00b894;
    --accent: #0984e3;
    --glass: rgba(255, 255, 255, 0.95);
    --card-shadow: 0 8px 32px rgba(31, 38, 135, 0.15);
}

body {
    font-family: 'Assistant', sans-serif;
    background: radial-gradient(circle at top right, #6c5ce7, #f8f9fa),
                radial-gradient(circle at bottom left, #00b894, #f8f9fa);
    background-attachment: fixed;
    margin: 0;
    padding: 15px;
    display: flex;
    justify-content: center;
    min-height: 100vh;
    color: #2d3436;
}

.main-container {
    width: 100%;
    max-width: 1000px;
    background: var(--glass);
    backdrop-filter: blur(20px);
    border-radius: 32px;
    padding: 40px;
    box-shadow: var(--card-shadow);
}

/* HEADER */
.header {
    text-align: center;
    margin-bottom: 40px;
}

.header h1 {
    font-size: 3rem;
    margin: 0;
    background: linear-gradient(135deg, var(--primary), var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* 🔥 הפרדה ויזואלית חדשה */
.section-box {
    background: rgba(255,255,255,0.85);
    border-radius: 24px;
    padding: 25px;
    margin-bottom: 28px;
    box-shadow: 0 6px 25px rgba(0,0,0,0.06);
    border: 1px solid rgba(255,255,255,0.6);
    transition: 0.3s;
}

.section-box:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 35px rgba(108,92,231,0.15);
}

.section-label {
    font-size: 1.2rem;
    margin: 0 0 20px;
    padding-right: 12px;
    border-right: 5px solid var(--primary);
    font-weight: 800;
}

/* GRID */
.button-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 20px;
}

.nav-card {
    background: #fff;
    padding: 20px;
    border-radius: 18px;
    text-decoration: none;
    color: #2d3436;
    text-align: center;
    font-weight: 700;
    transition: 0.3s;
    border: 1px solid #f1f5f9;
}

.nav-card:hover {
    transform: translateY(-6px);
    border-color: var(--primary);
    color: var(--primary);
}

/* selection */
.selection-zone {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
}

select {
    padding: 15px;
    border-radius: 14px;
    border: 2px solid #e2e8f0;
    font-weight: 600;
}

.action-group {
    grid-column: span 2;
    display: flex;
    gap: 15px;
}

.action-btn {
    flex: 1;
    padding: 16px;
    border-radius: 14px;
    border: none;
    font-weight: 800;
    color: white;
    cursor: pointer;
}

.btn-view { background: var(--secondary); }
.btn-copy { background: var(--primary); }

/* share */
.share-list {
    display: grid;
    gap: 15px;
}

.share-item {
    background: white;
    padding: 18px;
    border-radius: 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border: 1px solid #e2e8f0;
}

.copy-button {
    background: #f1f5f9;
    border: none;
    padding: 10px 18px;
    border-radius: 10px;
    cursor: pointer;
    font-weight: 700;
}

/* mobile */
@media (max-width: 768px) {
    .selection-zone {
        grid-template-columns: 1fr;
    }

    .action-group {
        grid-column: span 1;
        flex-direction: column;
    }
}
</style>
</head>

<body>

<div class="main-container">

<div class="header">
    <h1>מרכז שליטה Premium</h1>
</div>

<!-- 🚀 גישה מהירה -->
<div class="section-box">
    <div class="section-label">🚀 גישה מהירה למערכות</div>

    <div class="button-grid">
        <a href="https://someschool.monday.com/boards/1541471339/views/42571594" target="_blank" class="nav-card">📞 פניות הורים</a>
        <a href="https://someschool.monday.com/boards/1541471339/views/45904460" target="_blank" class="nav-card">👨‍🏫 פניות מורים</a>
        <a href="https://someschool.monday.com/overviews/11126245" target="_blank" class="nav-card">📊 מרכז בקרה</a>
        <a href="https://someschool.monday.com/boards/1447099307/views/16290552" target="_blank" class="nav-card">🎓 כל התלמידים</a>
        <a href="https://someschool.monday.com/boards/5092169178/views/44126047" target="_blank" class="nav-card">✍️ סיכום פגישה</a>
        <a href="https://someschool.monday.com/boards/5092169178/views/46565001" target="_blank" class="nav-card">📜 היסטוריית פגישות</a>
    </div>
</div>

<!-- 🏫 ניהול -->
<div class="section-box">
    <div class="section-label">🏫 ניהול מצב כיתתי חכם</div>

    <div class="selection-zone">
        <select id="classPick">
            <option value="">🏫 בחר כיתה...</option>
            <option value="A">כיתה א'</option>
            <option value="B">כיתה ב'</option>
            <option value="C">כיתה ג'</option>
            <option value="D">כיתה ד'</option>
            <option value="E">כיתה ה'</option>
            <option value="F">כיתה ו'</option>
            <option value="Z1">כיתה ז'1</option>
            <option value="Z2">כיתה ז'2</option>
            <option value="H1">כיתה ח'1</option>
            <option value="H2">כיתה ח'2</option>
        </select>

        <select id="subjectPick">
            <option value="">📚 בחר מקצוע...</option>
            <option value="tora">📖 תורה</option>
            <option value="lashon">✍️ לשון</option>
            <option value="heshbon">📐 חשבון</option>
        </select>

        <div class="action-group">
            <button class="action-btn btn-view" onclick="goToClassTable()">🔍 צפה בטבלה</button>
            <button class="action-btn btn-copy" id="teacherBtn" onclick="copyTeacherLink()">🔗 העתק קישור</button>
        </div>
    </div>
</div>

<!-- 🔗 שיתופים -->
<div class="section-box">
    <div class="section-label">🔗 קישורי הפצה מהירים</div>

    <div class="share-list">
        <div class="share-item">
            <span>📝 טופס מורים</span>
            <button class="copy-button" onclick="copyValue('https://forms.monday.com/forms/b7ec382631ba4e4e8144a15d9709cdb8?r=euc1', this)">העתק</button>
        </div>

        <div class="share-item">
            <span>🏠 טופס הורים</span>
            <button class="copy-button" onclick="copyValue('https://forms.monday.com/forms/3a52cc1446fab90ae337b5293d2cdbaf?r=euc1', this)">העתק</button>
        </div>
    </div>
</div>

<!-- ⚙️ אדמין -->
<div class="section-box">
    <div class="section-label">⚙️ ניהול אדמיניסטרטיבי</div>

    <div class="button-grid">
        <a href="https://wkf.ms/4arsBX9" target="_blank" class="nav-card">➕ הוספת תלמיד</a>
        <a href="https://wkf.ms/3VSgi1G" target="_blank" class="nav-card">➕ הוספת מורה</a>
        <a href="https://someschool.monday.com/boards/1456791981/views/13636542" target="_blank" class="nav-card">👥 טבלת מורים</a>
    </div>
</div>

</div>

<script>
const classLinks = {
    'A': {
        'tora': 'https://someschool.monday.com/boards/5092851319/views/45187946',
        'lashon': 'https://someschool.monday.com/boards/5092851319/views/45187943',
        'heshbon': 'https://someschool.monday.com/boards/5092851319/views/45187945',
        'general': 'https://someschool.monday.com/boards/5092851319/views/45187942'
    }
};

function goToClassTable() {
    const cls = document.getElementById('classPick').value;
    if(!cls) return alert('בחר כיתה');
    const url = classLinks[cls]['general'];
    window.open(url, '_blank');
}

function copyTeacherLink() {
    const cls = document.getElementById('classPick').value;
    const sub = document.getElementById('subjectPick').value;
    const btn = document.getElementById('teacherBtn');

    const url = classLinks[cls][sub];

    navigator.clipboard.writeText(url).then(() => {
        btn.innerText = "הועתק ✔";
        setTimeout(() => btn.innerText = "🔗 העתק קישור", 1500);
    });
}

function copyValue(val, btn) {
    navigator.clipboard.writeText(val).then(() => {
        btn.innerText = "הועתק ✔";
        setTimeout(() => btn.innerText = "העתק", 1500);
    });
}
</script>

</body>
</html>
